<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <description>TLE fontconfig file</description>

  <!-- Inherit the system fonts/cache config when present so non-bundled text
       still renders. Harmless if the system config is absent. -->
  <include ignore_missing="yes">/etc/fonts/fonts.conf</include>

  <!-- Fonts bundled with the bot (downloaded into data/assets/fonts at startup):
       Noto Sans CJK, optionally Noto Color Emoji, and monochrome Noto Emoji. -->
  <dir prefix="cwd">data/assets/fonts</dir>

  <!-- Older Cairo (e.g. 1.16 on Ubuntu 20.04) cannot rasterize the color bitmap
       Noto Color Emoji; reject it so Pango falls back to the monochrome Noto
       Emoji, which renders reliably. Drop this block once the host Cairo >= 1.18
       and you want color emoji without the run.sh bootstrap. -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>Noto Color Emoji</string></patelt>
      </pattern>
    </rejectfont>
  </selectfont>
</fontconfig>
