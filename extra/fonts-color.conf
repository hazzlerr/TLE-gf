<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <description>TLE fontconfig file with color emoji enabled</description>

  <!-- Inherit the system fonts/cache config when present so non-bundled text
       still renders. Harmless if the system config is absent. -->
  <include ignore_missing="yes">/etc/fonts/fonts.conf</include>

  <!-- Fonts bundled with the bot (downloaded into data/assets/fonts at startup):
       Noto Sans CJK, Noto Color Emoji, and monochrome Noto Emoji fallback. -->
  <dir prefix="cwd">data/assets/fonts</dir>
</fontconfig>
